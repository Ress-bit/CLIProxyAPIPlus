services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api-plus:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api-plus
    environment:
      # Cloud deploy mode - allows server to start without config.yaml
      DEPLOY: cloud
      # Management password - set this in Dokploy Environment Variables UI
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      # No config.yaml mount - will be auto-created from config.example.yaml
      # Auth tokens stored in persistent volume
      - ./auths:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
    restart: unless-stopped
